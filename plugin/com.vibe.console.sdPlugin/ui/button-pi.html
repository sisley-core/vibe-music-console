<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Vibe Button</title>
	<script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
	<sdpi-item label="API Path">
		<sdpi-textfield setting="url" placeholder="/vibe/profile/alice"></sdpi-textfield>
	</sdpi-item>
	<sdpi-item label="Display Label">
		<sdpi-textfield setting="label" placeholder="Alice"></sdpi-textfield>
	</sdpi-item>
	<sdpi-item label="Switch Profile">
		<sdpi-textfield setting="switchProfile" placeholder="profiles/alice"></sdpi-textfield>
	</sdpi-item>
</body>
</html>
